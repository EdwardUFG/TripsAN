<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Crear Categoría</h1>
<form th:action="@{/categorias/save}" method="post">
    <div class="mb-3">
        <label for="nomCategoria" class="form-label">Nombre</label>
        <input type="text" id="nomCategoria" name="nomCategoria" class="form-control">
    </div>
    <div class="mb-3">
        <label for="descripcion" class="form-label">Descripción</label>
        <textarea id="descripcion" name="descripcion" class="form-control"></textarea>
    </div>
    <div class="form-check mb-3">
        <input type="checkbox" id="activo" name="activo" class="form-check-input">
        <label for="activo" class="form-check-label">Activo</label>
    </div>
    <button type="submit" class="btn btn-primary">Guardar</button>
</form>


</div>

</body>
</html>
