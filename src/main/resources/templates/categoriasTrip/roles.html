<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<img alt="logo" th:src="@{/images/ufg.svg}"
     class="img-fluid mx-auto d-block mt-4"
     style="max-width:300px;">

<div class="container mt-4">
    <h1>Lista de Roles</h1>
    
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Fecha creación</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${roles}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.nombre}"></td>
                <td th:text="${r.descripcion}"></td>
                <td>
                    <span th:if="${r.activo}" class="badge bg-success">Activo</span>
                    <span th:unless="${r.activo}" class="badge bg-danger">Inactivo</span>
                </td>
                <td th:text="${r.fechaCreacion != null ? #dates.format(r.fechaCreacion, 'dd/MM/yyyy') : '-'}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
