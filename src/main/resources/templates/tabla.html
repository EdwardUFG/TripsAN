<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tabla de Trips</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Lista de Trips Disponibles</h1>
        
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Costo</th>
                    <th>Destacado</th> </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${trips}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.nombre}"></td>
                    <td th:text="${t.descripcion}"></td>
                    <td th:text="'$' + ${t.costo}"></td>
                    <td>
                        <span th:if="${t.destacado == 1}" class="badge bg-success">SÍ</span>
                        <span th:unless="${t.destacado == 1}" class="badge bg-danger">NO</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
