<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tabla de Trips</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<img alt="logo" th:src="@{/images/ufg.svg}"
     class="img-fluid mx-auto d-block mt-4"
     style="max-width:300px;">

<div class="container mt-4">
    <h1>Lista de Trips Disponibles</h1>
    
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>Foto</th>
                <th>Fecha publicación</th>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Costo</th>
                <th>Destacado</th>
                <th>Detalle</th>
                <th>Eliminar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${trips}">
         
                <td>
                    <img th:src="@{/images/{img}(img=${t.imagen})}" 
                         alt="foto trip" 
                         style="width:120px; height:auto;">
                </td>
                <td th:text="${t.fecha != null ? #dates.format(t.fecha, 'dd/MM/yyyy') : '-'}"></td>
                <td th:text="${t.id}"></td>
                <td th:text="${t.nombre}"></td>
                <td th:text="${t.descripcion}"></td>
                <td th:text="'$' + ${t.costo}"></td>
                <td>
                    <span th:if="${t.destacado == 1}" class="badge bg-success">SÍ</span>
                    <span th:unless="${t.destacado == 1}" class="badge bg-danger">NO</span>
                </td>
                <td>
                    <a th:href="@{/detalle(id=${t.id})}" class="btn btn-sm btn-info">Detalle</a>
                </td>
                <td>
                    <a th:href="@{/tabla}" class="btn btn-sm btn-danger">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
